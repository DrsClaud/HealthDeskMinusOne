name: QA-ESLint

on:
  push:

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci --no-audit
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

      - name: Run ESLint
        run: |
          npx eslint \
            --rule "@typescript-eslint/no-explicit-any: off" \
            --rule "@typescript-eslint/no-unused-expressions: off" \
            --rule "@typescript-eslint/no-unused-vars: off" \
            --rule "@typescript-eslint/no-empty-function: off" \
            --rule "@typescript-eslint/no-non-null-assertion: off" \
            --rule "@typescript-eslint/no-inferrable-types: off" \
            --rule "no-unused-vars: off" \
            --rule "no-undef: off" \
            --rule "no-unreachable: off" \
            src/
